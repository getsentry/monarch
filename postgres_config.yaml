# The manifest: cell-independent schema knowledge. Which stores exist, which tables live in
# which logical store, and how tables scope to the org. Where a logical store physically lives
# is per-cell deployment reality and belongs in fleet.yaml, not here: big cells split stores
# across database clusters, small cells colocate several stores in one database.

root: organization

stores:
  # postgres stores mirror the fleet's clusters (default / attachments / files / ...)
  default:     { type: postgres }
  attachments: { type: postgres }
  files:       { type: postgres }
  # blob store: referenced by columns (path: {blob: filestore}), never walked
  filestore:   { type: gcs_mock }

# table -> store placement + the scoping edges. `store` is a reserved key; the rest are columns.
relationships:
  organization:    { store: default }
  project:         { store: default, organization_id: { parent: organization } }
  group:           { store: default, project_id: { parent: project } }

  # Org project columns exist here but are nullable, group_id is always present
  groupinbox:      { store: default, organization_id: { parent: organization, nullable: true }, project_id: { parent: project, nullable: true }, group_id: { parent: group } }
  promptsactivity: { store: default, organization_id: { parent: organization }, project_id: { parent: project } }
  eventattachment: { store: attachments, project_id: { parent: project }, group_id: { parent: group, nullable: true } }

  # Carries both group and project
  groupassignee:   { store: default, group_id: { parent: group }, project_id: { parent: project } }
  grouprelease:    { store: default, group_id: { parent: group }, project_id: { parent: project } }
  # project_id is stable as group_id can be null or changed on merge/unmerge
  grouphash:       { store: default, project_id: { parent: project }, group_id: { parent: group, nullable: true } }

  # implicit foreign key without actual DB constraint, but we handle it all the same
  commit:          { store: default, organization_id: { parent: organization } }

  # these are HybridCloudForeighKey in Sentry, it's just a regular reference to us
  apikey:          { store: default, organization_id: { parent: organization } }
  orgauthtoken:    { store: default, organization_id: { parent: organization } }

  # Org ID is nullable, check if it's reliable otherwise scope by group_id instead
  groupredirect:   { store: default, organization_id: { parent: organization, nullable: true }, group_id: { parent: group } }

  release:         { store: default, organization_id: { parent: organization } }
  # many to many relationship, we can go through release or project
  releaseproject:  { store: default, release_id: { parent: release }, project_id: { parent: project } }

  # files table that references an external blob storage
  file:            { store: files, project_id: { parent: project }, path: { blob: filestore } }
