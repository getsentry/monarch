# Logical relationship graph used to scope an org move

root: organization

relationships:
  project:         { organization_id: { parent: organization } }
  group:           { project_id: { parent: project } }

  # Org project columns exist here but are nullable, group_id is always present
  groupinbox:      { organization_id: { parent: organization, nullable: true }, project_id: { parent: project, nullable: true }, group_id: { parent: group } }
  promptsactivity: { organization_id: { parent: organization }, project_id: { parent: project } }
  eventattachment: { project_id: { parent: project }, group_id: { parent: group, nullable: true } }

  # Carries both group and project
  groupassignee:   { group_id: { parent: group }, project_id: { parent: project } }
  grouprelease:    { group_id: { parent: group }, project_id: { parent: project } }
  # project_id is stable as group_id can be null or changed on merge/unmerge
  grouphash:       { project_id: { parent: project }, group_id: { parent: group, nullable: true } }

  # implicit foreign key without actual DB constraint, but we handle it all the same
  commit:          { organization_id: { parent: organization } }

  # these are HybridCloudForeighKey in Sentry, it's just a regular reference to us
  apikey:          { organization_id: { parent: organization } }
  orgauthtoken:    { organization_id: { parent: organization } }

  # Org ID is nullable, check if it's reliable otherwise scope by group_id instead
  groupredirect:   { organization_id: { parent: organization, nullable: true }, group_id: { parent: group } }

  release:         { organization_id: { parent: organization } }
  # many to many relationship, we can go through release or project
  releaseproject:  { release_id: { parent: release }, project_id: { parent: project } }

  # files table that references an external blob storage
  file:            { project_id: { parent: project }, path: { blob: filestore } }


blobs:
  filestore:
    store: gcs_mock
    file_path: mock_storages/buckets/filestore
