# The manifest: cell-independent schema knowledge. Which stores exist, which tables live in
# which logical store, and how tables scope to the org. Where a logical store physically lives
# is per-cell deployment configuration and belongs in fleet.yaml, not here. Some cells split stores
# across database clusters, others colocate several stores in one database.

root: organization

stores:
  # postgres stores mirror the fleet's clusters (default / attachments / files / ...)
  default:     { type: postgres }
  attachments: { type: postgres }
  # no reclaimer exists in Sentry, we should delete the object when the row is removed
  # (in objectstore's attachments in production a retention TTL also exists as a backstop)
  attachment_blobs: { type: blob_store, eviction: delete }
  files:       { type: postgres }
  # filestore is not org/project scoped so it is not safe to delete blobs referenced by
  # a specific project. Sentry's delete_unreferenced_blobs() / cleanup_unused_files()
  # is responsible for GC on the filestore.
  filestore:   { type: blob_store, eviction: keep }

# `project` is marked as static: its id set is assumed not to change during a move.
# Nothing is enforced on the customer -- a project creation or deletion mid-move fails
# the move instead. This is because `project` is the reference used across multiple
# storage systems - a static id set makes the cross-store edge free of race conditions.
relationships:
  organization:
    store: default

  project:
    store: default
    static: true
    refs:
      organization_id: { parent: organization }

  group:
    store: default
    refs:
      project_id: { parent: project }

  # Org and project columns exist here but are nullable, group_id is always present
  groupinbox:
    store: default
    refs:
      organization_id: { parent: organization, nullable: true }
      project_id:      { parent: project, nullable: true }
      group_id:        { parent: group }

  promptsactivity:
    store: default
    refs:
      organization_id: { parent: organization }
      project_id:      { parent: project }

  eventattachment:
    store: attachments
    refs:
      project_id: { parent: project }
      group_id:   { parent: group, nullable: true }
      blob_path:  { blob: attachment_blobs }

  # Carries both group and project
  groupassignee:
    store: default
    refs:
      group_id:   { parent: group }
      project_id: { parent: project }

  grouprelease:
    store: default
    refs:
      group_id:   { parent: group }
      project_id: { parent: project }

  # project_id is stable as group_id can be null or changed on merge/unmerge
  grouphash:
    store: default
    refs:
      project_id: { parent: project }
      group_id:   { parent: group, nullable: true }

  # implicit foreign key without actual DB constraint, but we handle it all the same
  commit:
    store: default
    refs:
      organization_id: { parent: organization }

  # these are HybridCloudForeignKey in Sentry, it's just a regular reference to us
  apikey:
    store: default
    refs:
      organization_id: { parent: organization }

  orgauthtoken:
    store: default
    refs:
      organization_id: { parent: organization }

  # Org ID is nullable, check if it's reliable otherwise scope by group_id instead
  groupredirect:
    store: default
    refs:
      organization_id: { parent: organization, nullable: true }
      group_id:        { parent: group }

  release:
    store: default
    refs:
      organization_id: { parent: organization }

  # many to many relationship, we can go through release or project
  releaseproject:
    store: default
    refs:
      release_id: { parent: release }
      project_id: { parent: project }

  # files table that references an external blob storage
  file:
    store: files
    refs:
      project_id: { parent: project }
      path:       { blob: filestore }
